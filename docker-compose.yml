version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: chess-room-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-chess_room}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/scripts/seed_data.sql:/docker-entrypoint-initdb.d/seed_data.sql
    networks:
      - chess-room-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: chess-room-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - chess-room-network
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: chess-room-backend
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USERNAME=root
      - DB_PASSWORD=${MYSQL_ROOT_PASSWORD:-123456}
      - DB_NAME=${MYSQL_DATABASE:-chess_room}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - mysql
      - redis
    volumes:
      - ./backend/config:/app/config
      - backend_logs:/app/logs
    networks:
      - chess-room-network
    restart: unless-stopped

  admin:
    build: ./admin
    container_name: chess-room-admin
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - chess-room-network
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: chess-room-frontend
    ports:
      - "3001:80"
    depends_on:
      - backend
    networks:
      - chess-room-network
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
  backend_logs:

networks:
  chess-room-network:
    driver: bridge