paths:
  /activities:
    get:
      consumes:
      - application/json
      description: 获取活动列表，管理员查看全部，普通用户只看启用的活动
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/model.Activity'
                  type: array
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: 获取活动列表
      tags:
      - 活动
    post:
      consumes:
      - application/json
      description: 管理员创建新活动
      parameters:
      - description: 活动信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/controller.ActivityCreateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/model.Activity'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: 创建活动
      tags:
      - 活动
  /activities/{id}:
    delete:
      consumes:
      - application/json
      description: 管理员删除活动
      parameters:
      - description: 活动ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: 删除活动
      tags:
      - 活动
    get:
      consumes:
      - application/json
      description: 根据活动ID获取活动详情
      parameters:
      - description: 活动ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/model.Activity'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Response'
      summary: 获取活动详情
      tags:
      - 活动
    put:
      consumes:
      - application/json
      description: 管理员更新活动信息
      parameters:
      - description: 活动ID
        in: path
        name: id
        required: true
        type: string
      - description: 活动更新信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/controller.ActivityUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/model.Activity'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: 更新活动
      tags:
      - 活动
