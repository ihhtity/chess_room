# 服务器配置
server:
  # 服务端口
  port: 8080
  # 运行模式
  mode: debug

# 数据库配置
database:
  # 数据库主机地址
  host: localhost
  # 数据库端口
  port: 3306
  # 数据库用户名
  username: root
  # 数据库密码
  password: 123456
  # 数据库名称
  database: chess_room
  # 字符集
  charset: utf8mb4
  # 最大空闲连接数
  max_idle_conns: 10
  # 最大打开连接数
  max_open_conns: 100
  # 连接最大生命周期（秒）
  conn_max_lifetime: 3600

# Redis配置
redis:
  # Redis主机地址
  host: localhost
  # Redis端口
  port: 6379
  # Redis密码
  password: 
  # 数据库编号
  db: 0
  # 连接池大小
  pool_size: 10

# JWT配置
jwt:
  # JWT密钥
  secret: chess-room-jwt-secret-key-2024
  # 过期时间（秒）
  expire_time: 7200

# 微信支付配置
wechat:
  # 应用ID
  app_id: 
  # 应用密钥
  app_secret: 
  # 商户号
  mch_id: 
  # API密钥
  api_key: 
  # 支付回调地址
  pay_notify_url: http://localhost:8080/api/payments/notify

# 日志配置
log:
  # 日志级别
  level: info
  # 日志格式
  format: text
  # 日志输出路径
  output: ./logs/app.log